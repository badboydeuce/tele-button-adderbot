services:
  - type: web
    name: telegram-channel-buttons-bot
    env: python
    region: oregon          # or frankfurt if you're closer to Europe/Africa
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false           # set this manually in dashboard
      - key: PYTHONUNBUFFERED
        value: "1"